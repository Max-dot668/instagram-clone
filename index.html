<html>
    <head>
        <link rel="stylesheet" href="index.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://gstatic.com" crossorigin>
        <link href="https://googleapis.com" rel="stylesheet">
    </head>
    <body>
        <header class="heading-section">
            <img src="images/logo.png">
            <img class="profile-pic" src="images/me.png" alt="A selfie picture of Max You making a piece sign">
        </header>
        <main>
            <section class="person">
                <div class="profile-header">
                    <img class="profile-pic" src="images/avatar-vangogh.jpg" alt="An avatar portrayal of Vincent Van Gogh">
                    <div class="profile-info">
                        <h3>Vincent van Gogh</h3>
                        <p>Zudert, Netherlands</p>
                    </div>           
                </div>
                <img class="post-pic" src="images/post-vangogh.jpg" alt="A self portrait of Vincent Van Gogh">
                <div class="feed">
                    <div class="button-icons">
                        <img src="images/icon-heart.png" alt="heart icon">
                        <img src="images/icon-comment.png" alt="comment bubble icon">
                        <img src="images/icon-dm.png" alt="paper plane icon">
                    </div>
                    <div class="feed-interactions">
                        <h3>21,492 likes</h3>
                        <h3>Vincey1853 <span class="user-comments">just took a few mushrooms lol</span></h3>
                    </div>
                </div>
            </section>

            <section class="person">
                <div class="feed"></div>
            </section>

            <section class="person">
                <div class="feed"></div>
            </section>
        </main>
        <script src="index.js"></script>
    </body>
</html>
